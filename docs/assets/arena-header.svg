<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="loop-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004D60"/>
      <stop offset="50%" stop-color="#3ABAA5"/>
      <stop offset="100%" stop-color="#8DC63F"/>
    </linearGradient>
    <linearGradient id="agent-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ABAA5"/>
      <stop offset="100%" stop-color="#8DC63F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="160" rx="12" fill="url(#bg)"/>

  <!-- Arena icon: open loop (TendedLoop brand) with orbiting agents -->
  <g transform="translate(55, 80)">
    <!-- The arena loop — open spiral like the TendedLoop logo -->
    <path d="M 0,-32 A 32,32 0 1,1 -22,22" stroke="url(#loop-grad)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M -22,22 L -14,14" stroke="#8DC63F" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <!-- Inner ring — the arena floor -->
    <circle cx="0" cy="0" r="18" stroke="#3ABAA5" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- Agent nodes — 4 competing agents orbiting the arena -->
    <circle cx="0" cy="-36" r="4.5" fill="#3ABAA5"/>
    <circle cx="34" cy="8" r="4.5" fill="#8DC63F"/>
    <circle cx="-8" cy="34" r="4.5" fill="#004D60" stroke="#3ABAA5" stroke-width="1"/>
    <circle cx="-34" cy="-12" r="4.5" fill="#1E2D3B" stroke="#8DC63F" stroke-width="1"/>

    <!-- Data flow lines — agents connected to arena center -->
    <line x1="0" y1="-31" x2="0" y2="-18" stroke="#3ABAA5" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="7" x2="16" y2="4" stroke="#8DC63F" stroke-width="1" opacity="0.3"/>
    <line x1="-7" y1="30" x2="-4" y2="16" stroke="#3ABAA5" stroke-width="1" opacity="0.2"/>
    <line x1="-30" y1="-11" x2="-16" y2="-6" stroke="#8DC63F" stroke-width="1" opacity="0.2"/>

    <!-- Center node — the platform -->
    <circle cx="0" cy="0" r="3" fill="url(#agent-a)" opacity="0.8"/>

    <!-- Pulse rings — activity indicator -->
    <circle cx="0" cy="0" r="24" stroke="#3ABAA5" stroke-width="0.5" fill="none" opacity="0.1"/>
    <circle cx="0" cy="0" r="40" stroke="#3ABAA5" stroke-width="0.3" fill="none" opacity="0.05"/>
  </g>

  <!-- Text -->
  <text x="130" y="68" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="white" letter-spacing="-0.5">TendedLoop Arena</text>
  <text x="130" y="96" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b" letter-spacing="0.3">Multi-Agent Gamification Research Platform</text>

  <!-- Accent line -->
  <rect x="130" y="108" width="280" height="1.5" rx="1" fill="url(#loop-grad)" opacity="0.3"/>

  <!-- Badges -->
  <rect x="130" y="120" width="48" height="18" rx="4" fill="#3ABAA5" opacity="0.12"/>
  <text x="139" y="133" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#3ABAA5">v0.1.0</text>

  <rect x="186" y="120" width="72" height="18" rx="4" fill="#004D60" opacity="0.2"/>
  <text x="195" y="133" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#3ABAA5" opacity="0.8">Python 3.10+</text>

  <rect x="266" y="120" width="32" height="18" rx="4" fill="#8DC63F" opacity="0.1"/>
  <text x="274" y="133" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8DC63F" opacity="0.7">MIT</text>
</svg>
