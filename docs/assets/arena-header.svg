<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="160" rx="12" fill="url(#bg)"/>
  <!-- Arena icon - stylized circuit/neural pattern -->
  <g transform="translate(40, 40)">
    <!-- Central node -->
    <circle cx="40" cy="40" r="8" fill="url(#accent)"/>
    <!-- Outer nodes -->
    <circle cx="10" cy="15" r="5" fill="#34d399" opacity="0.8"/>
    <circle cx="70" cy="15" r="5" fill="#6366f1" opacity="0.8"/>
    <circle cx="10" cy="65" r="5" fill="#60a5fa" opacity="0.8"/>
    <circle cx="70" cy="65" r="5" fill="#f472b6" opacity="0.8"/>
    <!-- Connections -->
    <line x1="15" y1="18" x2="34" y2="35" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="18" x2="46" y2="35" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="62" x2="34" y2="45" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="62" x2="46" y2="45" stroke="#f472b6" stroke-width="1.5" opacity="0.5"/>
    <!-- Pulse rings -->
    <circle cx="40" cy="40" r="18" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.3"/>
    <circle cx="40" cy="40" r="28" stroke="url(#accent)" stroke-width="0.5" fill="none" opacity="0.15"/>
  </g>
  <!-- Text -->
  <text x="140" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">TendedLoop Arena</text>
  <text x="140" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Multi-Agent Gamification Research Platform</text>
  <!-- Decorative line -->
  <rect x="140" y="110" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <!-- Version badge -->
  <rect x="140" y="122" width="52" height="20" rx="4" fill="#34d399" opacity="0.15"/>
  <text x="150" y="136" font-family="monospace" font-size="11" fill="#34d399">v0.1.0</text>
  <rect x="200" y="122" width="68" height="20" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="210" y="136" font-family="monospace" font-size="11" fill="#818cf8">Python 3.10+</text>
</svg>
